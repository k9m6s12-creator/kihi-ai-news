<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毎朝のAIニュース・ダイジェスト</title>
<style>
  :root{
    --bg:#0a0e12; --panel:#11171e; --panel2:#0d1318;
    --text:#e6f1f5; --muted:#8aa0ab;
    --cyan:#36d8e0; --teal:#1fb6c2; --green:#5ff08a; --red:#ff6b6b;
    --line:#1d2932;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:radial-gradient(1200px 600px at 70% -10%, #10212a 0%, var(--bg) 60%);
    color:var(--text); font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
    line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px; margin:0 auto; padding:24px 16px 80px}
  header.site{padding:14px 0 22px; border-bottom:1px solid var(--line); margin-bottom:24px}
  .brand{display:flex; align-items:center; gap:10px}
  .dot{width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--cyan), var(--teal));
    box-shadow:0 0 14px var(--cyan)}
  h1{font-size:1.35rem; margin:0; letter-spacing:.02em}
  .sub{color:var(--muted); font-size:.85rem; margin-top:6px}
  .count{color:var(--cyan); font-size:.8rem; margin-top:10px}

  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line); border-radius:14px; padding:18px 18px 6px;
    margin:18px 0; box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .date{display:inline-block; font-size:.78rem; color:#04222a; font-weight:700;
    background:linear-gradient(90deg,var(--cyan),var(--teal)); padding:3px 10px; border-radius:999px}
  .pick{margin:14px 0 6px; padding:12px 14px; border-left:3px solid var(--green);
    background:rgba(95,240,138,.07); border-radius:0 10px 10px 0}
  .pick .lbl{color:var(--green); font-weight:700; font-size:.78rem; letter-spacing:.04em; display:block; margin-bottom:4px}
  .sumtitle,.sectitle{color:var(--cyan); font-size:.82rem; font-weight:700; letter-spacing:.05em;
    margin:18px 0 6px; text-transform:none}
  ul{margin:6px 0 4px; padding-left:1.15em}
  li{margin:4px 0}
  .topic{border-top:1px dashed var(--line); padding:12px 0 6px}
  .topic:first-of-type{border-top:none}
  .topic h3{font-size:1rem; margin:0 0 6px}
  .tag{font-size:.68rem; color:var(--muted); border:1px solid var(--line);
    padding:1px 7px; border-radius:999px; margin-left:8px; vertical-align:middle}
  .meta{color:var(--muted); font-size:.86rem; margin:2px 0}
  .meta b{color:var(--text); font-weight:600}
  .idea{color:var(--green); font-size:.86rem; margin:2px 0}
  .idea::before{content:"✎ "; opacity:.8}
  details.sources{margin:10px 0 6px}
  details.sources summary{cursor:pointer; color:var(--muted); font-size:.82rem; outline:none}
  details.sources a{color:var(--teal); text-decoration:none; word-break:break-all}
  details.sources li{font-size:.82rem}
  footer{color:var(--muted); font-size:.78rem; text-align:center; margin-top:30px}
  @media(max-width:480px){ h1{font-size:1.15rem} .wrap{padding:18px 12px 70px} }
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <div class="brand"><span class="dot"></span><h1>毎朝のAIニュース・ダイジェスト</h1></div>
    <div class="sub">AI・生成AI・Claude Code の動きを、毎朝ためていく個人用ニュース棚。</div>
    <div class="count" id="count"></div>
  </header>
  <main id="list"></main>
  <footer>Generated by <code>/news-digest</code> ・ 非エンジニアのAI活用記録</footer>
</div>

<script src="digests.js"></script>
<script>
  const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const list = document.getElementById('list');
  const data = (window.DIGESTS || []);
  document.getElementById('count').textContent = `${data.length} 件のダイジェスト`;

  if(!data.length){ list.innerHTML = '<p style="color:var(--muted)">まだダイジェストがありません。</p>'; }

  data.forEach(d => {
    const topics = (d.topics||[]).map(t => `
      <div class="topic">
        <h3>${esc(t.title)}${t.tag?`<span class="tag">${esc(t.tag)}</span>`:''}</h3>
        ${t.why?`<div class="meta"><b>なぜ重要</b>：${esc(t.why)}</div>`:''}
        ${t.idea?`<div class="idea">記事ネタ：${esc(t.idea)}</div>`:''}
      </div>`).join('');

    const summary = (d.summary||[]).map(s=>`<li>${esc(s)}</li>`).join('');
    const small = (d.small&&d.small.length)?`
      <div class="sectitle">小ネタ</div><ul>${d.small.map(s=>`<li>${esc(s)}</li>`).join('')}</ul>`:'';
    const sources = (d.sources&&d.sources.length)?`
      <details class="sources"><summary>出典 (${d.sources.length})</summary>
        <ul>${d.sources.map(s=>`<li><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a></li>`).join('')}</ul>
      </details>`:'';

    list.insertAdjacentHTML('beforeend', `
      <article class="card">
        <span class="date">${esc(d.date)}</span>
        ${d.pick?`<div class="pick"><span class="lbl">今日の一推し</span>${esc(d.pick)}</div>`:''}
        <div class="sumtitle">3行サマリー</div>
        <ul>${summary}</ul>
        <div class="sectitle">トピック</div>
        ${topics}
        ${small}
        ${sources}
      </article>`);
  });
</script>
</body>
</html>
